services:
  postgres_mae:
    image: postgres-mae:v16
    container_name: postgres-mae
    build: .
    develop:
      watch:
        - action: rebuild
          path: .
          ignore:
            - docker-compose.yml
    volumes:
      - ./:/workspace
    environment:
      # -----------------------------------------------------------------------------
      # script config
      # -----------------------------------------------------------------------------
      APP_ENV: "test" # Only for pg_tests container; allowed: prod, dev, stage, test (case-insensitive)
      DEBUG: "1" # Enable verbose logging in scripts
      # PG_LOG: "1" # If set, stream postgres logs to stdout (pg_tests container only)
      # PG_TEST_LOG: "1"

      # -----------------------------------------------------------------------------
      # Destructive reset guard
      # DANGER: Setting this to 'true' will permanently and irrecoverably destroy and
      # recreate the database on critical failure. There is no undo.
      # Do NOT set this in any deployed environment.
      # APP_ENV no longer controls any destructive behaviour — this flag is required.
      # -----------------------------------------------------------------------------
      # CONFIRM_IRREVOCABLE_DATABASE_WIPE: "false"

      # -----------------------------------------------------------------------------
      # Database identity / networking
      # -----------------------------------------------------------------------------
      DB_HOST: "127.0.0.1"
      DB_PORT: "${DB_PORT:-5432}" # Default 5432; override via environment (Issue #12/#21)
      APP_DB_NAME: "mae_test"

      # -----------------------------------------------------------------------------
      # Postgres bootstrap superuser
      # -----------------------------------------------------------------------------
      SUPERUSER: "postgres"
      SUPERUSER_PWD: "password"

      # -----------------------------------------------------------------------------
      # LOGIN roles
      # -----------------------------------------------------------------------------
      MIGRATOR_USER: "db_migrator"
      MIGRATOR_PWD: "migrator_secret"

      APP_USER: "app"
      APP_USER_PWD: "secret"

      TABLE_PROVISIONER_USER: "table_provisioner"
      TABLE_PROVISIONER_PWD: "provisioner_secret"
      SEARCH_PATH: "app"
    ports:
      - "${DB_PORT:-5432}:${DB_PORT:-5432}"
